#Kafka properties
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS}
kafka.audio.upload.event.max.poll.records=${KAFKA_AUDIO_UPLOAD_EVENT_MAX_RECORDS:1}
kafka.audio.upload.event.concurrency=${KAFA_AUDIO_UPLOAD_EVENT_CONCURRENCY:1}
kafka.audio.upload.event.topic=${KAFKA_AUDIO_UPLOAD_EVENT_TOPIC:audio-upload-events}
kafka.topic.group.feed.data=${KAFKA_TOPIC_GROUP_FEED_DATA:audio-worker-group}
kafka.concurrency.feed.orders=${KAFKA_CONCURRENCY_FEED_ORDERS:1}
kafka.max.poll.records.feed.orders=${KAFKA_MAX_POLL_RECORDS_FEED_ORDERS:1}
kafka.audio.transcription.result.topic=${KAFKA_AUDIO_TRANSCRIPTION_RESULT_TOPIC:audio-transcription-result-events}
kafka.publish.transcription.result.topic=${KAFKA_PUBLISH_TRANSCRIPTION_RESULT_TOPIC:publish-audio-transcription-result-events}
elevenlabs.api.key=${ELEVENLABS_API_KEY}
kafka.audio.transcription.completed.event.topic=${KAFKA_AUDIO_TRANSCRIPTION_COMPLETED_EVENT_TOPIC:audio-transcription-completed-events}
minio.endpoint=${MINIO_ENDPOINT}
minio.access.key=${MINIO_ACCESS_KEY}
minio.secret.key=${MINIO_SECRET_KEY}
minio.bucket.name=${MINIO_BUCKET_NAME:audio-files}

# Enable debug logging to observe Kafka commits/acks when troubleshooting offsets
logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=INFO