server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: music-transcript-service

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}

  spring:
    kafka:
      bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

cloud:
  aws:
    region:
      static: ${AWS_REGION}
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}

aws:
  s3:
    bucket: ${S3_BUCKET}
  sqs:
    queue-url: ${SQS_URL}