services:

  backend:
    build: .
    container_name: music-backend
    ports:
      - "8080:8080"
    depends_on:
      - kafka
      - minio
      - nginx
    restart: always
    environment:
      - SPRING_DATA_MONGODB_URI=${SPRING_DATA_MONGODB_URI}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - AWS_REGION=${AWS_REGION}
      - S3_BUCKET=${S3_BUCKET}
      - SQS_URL=${SQS_URL}

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx256m"

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SERVER_URL: http://35.154.43.147:9000   # ✅ FIXED
      MINIO_NOTIFY_KAFKA_ENABLE: "on"
      MINIO_NOTIFY_KAFKA_BROKERS: "kafka:9092"
      MINIO_NOTIFY_KAFKA_TOPIC: "audio-upload-events"
      MINIO_NOTIFY_KAFKA_ENABLE_SECONDARY: "on"
      MINIO_NOTIFY_KAFKA_BROKERS_SECONDARY: "kafka:9092"
      MINIO_NOTIFY_KAFKA_TOPIC_SECONDARY: "audio-transcription-completed-events"
    volumes:
      - minio_data:/data

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "9000:9000"
    depends_on:
      - minio
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

  minio-setup:
    image: minio/mc
    container_name: minio-setup
    depends_on:
      - minio
      - kafka
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO...';
      sleep 20;

      mc alias set local http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD;

      mc mb local/audio-files || true;

      mc admin config set local notify_kafka:primary enable=on,brokers=kafka:9092,topic=audio-upload-events;

      mc admin config set local notify_kafka:secondary enable=on brokers=kafka:9092 topic=audio-transcription-completed-events;

      mc event add local/audio-files arn:minio:sqs::primary:kafka --event put || true;
      mc event add local/audio-files arn:minio:sqs::secondary:kafka --event put || true;

      echo 'Setup done!';
      "

volumes:
  minio_data: